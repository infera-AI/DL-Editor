name: Build release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload installers to"
        required: true
        default: "v1.0.3"

permissions:
  contents: write

jobs:
  release:
    name: Ensure GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${RELEASE_TAG#v}"
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "DL Studio ${version}" \
              --notes "DL Studio ${version}" \
              --draft \
              --repo "${{ github.repository }}"

  mac:
    name: macOS ${{ matrix.arch }} installers
    runs-on: macos-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            ffprobe: ffprobe-arm64
            file_match: "Mach-O 64-bit executable arm64"
          - arch: x64
            ffprobe: ffprobe-x64
            file_match: "Mach-O 64-bit executable x86_64"
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      DL_STUDIO_MAC_ARCH: ${{ matrix.arch }}
      npm_config_arch: ${{ matrix.arch }}
    defaults:
      run:
        working-directory: Mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Mac/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --config electron-builder.config.cjs --mac dmg pkg --${{ matrix.arch }} --config.directories.output=release-upload
      - name: Verify macOS bundled binaries
        run: |
          file "release-upload/mac-${{ matrix.arch }}/DL Studio.app/Contents/MacOS/DL Studio" | tee /tmp/app-file.txt
          file "release-upload/mac-${{ matrix.arch }}/DL Studio.app/Contents/Resources/bin/ffmpeg" | tee /tmp/ffmpeg-file.txt
          file "release-upload/mac-${{ matrix.arch }}/DL Studio.app/Contents/Resources/bin/${{ matrix.ffprobe }}" | tee /tmp/ffprobe-file.txt
          grep -q "${{ matrix.file_match }}" /tmp/app-file.txt
          grep -q "${{ matrix.file_match }}" /tmp/ffmpeg-file.txt
          grep -q "${{ matrix.file_match }}" /tmp/ffprobe-file.txt
      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          gh release upload "$RELEASE_TAG" \
            "release-upload/DL-Studio-Mac-${version}-${{ matrix.arch }}.dmg" \
            "release-upload/DL-Studio-Mac-${version}-${{ matrix.arch }}.pkg" \
            "release-upload/DL-Studio-Mac-${version}-${{ matrix.arch }}.dmg.blockmap" \
            --clobber \
            --repo "${{ github.repository }}"

  windows:
    name: Windows x64 installer
    runs-on: windows-latest
    needs: release
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Windows/package-lock.json
      - run: npm ci
      - run: npm run dist
      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          gh release upload "$env:RELEASE_TAG" `
            "release/DL-Studio-Windows-Setup-$version.exe" `
            "release/DL-Studio-Windows-Setup-$version.exe.blockmap" `
            --clobber `
            --repo "${{ github.repository }}"

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - mac
      - windows
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --latest \
            --repo "${{ github.repository }}"
