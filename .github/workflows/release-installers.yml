name: Build release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload installers to"
        required: true
        default: "v1.0.3"

permissions:
  contents: write

jobs:
  release:
    name: Ensure GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${RELEASE_TAG#v}"
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "DL Studio ${version}" \
              --notes "DL Studio ${version}" \
              --latest \
              --repo "${{ github.repository }}"

  mac:
    name: macOS arm64 installers
    runs-on: macos-14
    needs: release
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: Mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Mac/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac dmg pkg --arm64 --config.directories.output=release-upload
      - name: Verify macOS bundled binaries
        run: |
          file "release-upload/mac-arm64/DL Studio.app/Contents/Resources/bin/ffmpeg"
          file "release-upload/mac-arm64/DL Studio.app/Contents/Resources/bin/ffprobe-arm64" | tee /tmp/ffprobe-file.txt
          grep -q "Mach-O 64-bit executable arm64" /tmp/ffprobe-file.txt
      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          gh release upload "$RELEASE_TAG" \
            "release-upload/DL-Studio-Mac-${version}-arm64.dmg" \
            "release-upload/DL-Studio-Mac-${version}-arm64.pkg" \
            "release-upload/DL-Studio-Mac-${version}-arm64.dmg.blockmap" \
            --clobber \
            --repo "${{ github.repository }}"

  windows:
    name: Windows x64 installer
    runs-on: windows-latest
    needs: release
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Windows/package-lock.json
      - run: npm ci
      - run: npm run dist
      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          gh release upload "$env:RELEASE_TAG" `
            "release/DL-Studio-Windows-Setup-$version.exe" `
            "release/DL-Studio-Windows-Setup-$version.exe.blockmap" `
            --clobber `
            --repo "${{ github.repository }}"
